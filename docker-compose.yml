services:
  fnp-front:
    build:
      context: ./fnp-front
      dockerfile: Dockerfile
    image: fnp-front:latest
    container_name: fnp-front
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      # 백엔드 추가 시 여기에 NEXT_PUBLIC_API_URL 등 추가
      # - NEXT_PUBLIC_API_URL=https://api.example.com
